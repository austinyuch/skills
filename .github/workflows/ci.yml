name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: repo checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ci-checks.sh: manifest <-> filesystem, doc-twin freshness, bilingual-HTML
      # balance, machine-path scan, relative-link check, installer smoke, secret scan.
      # (jq + pwsh are preinstalled on ubuntu-latest runners.)
      - name: Run repo checks
        run: bash scripts/ci-checks.sh
